name = "svengali"
main = "src/app.js"
account_id = "6c076286f15a83422c0820534c5464e8"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
GITHUB_OWNER = "Mulholland-Inc"
GITHUB_REPO = "site"
GITHUB_BRANCH = "main"

# Sessions + GitHub App config (created by /__setup).
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "0a50414995ea46dd88907a833c592d06"

# Read-through cache for served files.
[[kv_namespaces]]
binding = "SITE_CACHE"
id = "fd7c262572d04ef790a3b41f9d7e1ccf"

# Drop the EditorAgent DO from prior deployments.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["EditorAgent"]

[[migrations]]
tag = "v2"
deleted_classes = ["EditorAgent"]

# Secrets — set via `wrangler secret put`:
#   COOKIE_SECRET — any long random string (HMAC for OAuth state)
#
# App ID, private key, client secret, installation id are persisted in
# OAUTH_KV under `app_config` after running through /__setup.
